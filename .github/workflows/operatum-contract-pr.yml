# operatum-contract-pr.yml — reusable workflow, pull_request callable
#
# Invoked from a tenant repo's caller workflow via:
#   uses: operatum-ai/operatum-ci/.github/workflows/operatum-contract-pr.yml@v1
#
# Trust surface (round-17 + round-27 PR-56 review):
# - Declares ONLY `callback_hmac` in workflow_call.secrets.
# - NO job declares `environment:`; provider-keyed secret references
#   resolve to empty here even if a PR author edits the caller to map
#   them — the trust boundary is enforced by GitHub's schema layer,
#   not by caller good behaviour.
#
# Status (KB-7 PR B initial scaffold): the cheap-fan-in chain
# (resolve-context → setup → lint/typecheck/manifest-validate/
# secret-scan → compose-summary → callback) is present. The four
# tenant-test marker-jobs (unit/integration/e2e/visual) + their
# dispatch-only provider siblings + preview-deploy + log-capture
# land in follow-up commits per the plan ladder.

name: operatum-contract-pr

on:
  workflow_call:
    inputs:
      target_type:
        description: "app | service | library | sidecar | platform"
        type: string
        required: true
      kaizen_job_id:
        description: "Kaizen job UUID; CORRELATION CONTEXT ONLY — never a trust signal."
        type: string
        required: false
        default: ""
      pr_number:
        description: "PR number from client_payload on the dispatch path; pull_request leaves empty"
        type: string
        required: false
        default: ""
      head_sha:
        description: "PR head SHA from client_payload on the dispatch path; pull_request leaves empty"
        type: string
        required: false
        default: ""
      tenant_id:
        description: "Kaizen tenant id; OPTIONAL — workflow reads vars.OPERATUM_TENANT_ID at runtime when empty"
        type: string
        required: false
        default: ""
      callback_url:
        description: "Kaizen base URL; OPTIONAL — workflow reads vars.OPERATUM_CALLBACK_URL at runtime when empty"
        type: string
        required: false
        default: ""
      require_visual:
        type: boolean
        required: false
        default: false
      require_unit:
        type: boolean
        required: false
        default: true
      require_integration:
        type: boolean
        required: false
        default: false
      require_e2e:
        type: boolean
        required: false
        default: true
      require_playwright:
        type: boolean
        required: false
        default: true
      require_tenant_isolation:
        type: boolean
        required: false
        default: false
      runs_on:
        description: "Runner label; defaults to ubuntu-latest"
        type: string
        required: false
        default: "ubuntu-latest"
      contract_workflow_version:
        description: "Forced override for the manifest's reporter_version field"
        type: string
        required: false
        default: ""
    secrets:
      callback_hmac:
        description: >-
          Per-(tenant, github_repo_id) HMAC secret. The ONLY secret
          declared on the pull_request reusable surface — provider-test
          secret names are deliberately NOT declared here so a PR-edit
          attack mapping OPENAI_TEST_API_KEY etc. fails workflow-
          resolution. The trust boundary is enforced by GitHub's schema
          layer.
        required: false

permissions:
  contents: read
  checks: read
  actions: read

jobs:
  resolve-context:
    runs-on: ${{ inputs.runs_on }}
    outputs:
      head_sha: ${{ steps.context.outputs.head_sha }}
      pr_number: ${{ steps.context.outputs.pr_number }}
      is_kaizen_owned: ${{ steps.context.outputs.is_kaizen_owned }}
      provider_secrets_available: ${{ steps.context.outputs.provider_secrets_available }}
    steps:
      - name: Resolve PR context
        id: context
        shell: bash
        env:
          INPUT_HEAD_SHA: ${{ inputs.head_sha }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # PR reusable: pull_request event always present; resolve
          # head_sha and pr_number from github.event.* with input
          # fallback (kept for symmetry with the dispatch variant).
          HEAD_SHA="${INPUT_HEAD_SHA:-$EVENT_HEAD_SHA}"
          PR_NUMBER="${INPUT_PR_NUMBER:-$EVENT_PR_NUMBER}"
          # PR reusable: no provider secrets are available regardless of
          # ownership (no job declares `environment: kaizen-trusted`).
          # is_kaizen_owned is informational here; the marker-jobs use
          # it to emit reason=pr_workflow_surface vs untrusted_pr.
          # Grouped redirect to satisfy shellcheck SC2129.
          {
            echo "head_sha=$HEAD_SHA"
            echo "pr_number=$PR_NUMBER"
            echo "is_kaizen_owned=0"
            echo "provider_secrets_available=0"
          } >> "$GITHUB_OUTPUT"

  setup:
    needs: [resolve-context]
    runs-on: ${{ inputs.runs_on }}
    outputs:
      node_version: ${{ steps.detect.outputs.node_version }}
      package_manager: ${{ steps.detect.outputs.package_manager }}
      has_playwright: ${{ steps.detect.outputs.has_playwright }}
      deps_cache_key: ${{ steps.cache_key.outputs.deps_cache_key }}
      setup_status: ${{ steps.write_status.outputs.status }}
    steps:
      - id: init_status
        shell: bash
        run: echo '{"status":"pending","stage":null,"reason":null}' > setup-status.json
      - id: checkout
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-context.outputs.head_sha }}
      - if: steps.checkout.outcome != 'success'
        shell: bash
        run: echo '{"status":"failed","stage":"checkout","reason":"checkout_failed"}' > setup-status.json
      - if: steps.checkout.outcome == 'success'
        uses: operatum-ai/operatum-ci/actions/setup-toolchain@v1
        id: detect
        continue-on-error: true
      - if: steps.checkout.outcome == 'success' && steps.detect.outcome != 'success'
        shell: bash
        run: echo '{"status":"failed","stage":"toolchain","reason":"toolchain_detection_failed"}' > setup-status.json
      - if: steps.checkout.outcome == 'success' && steps.detect.outcome == 'success'
        uses: operatum-ai/operatum-ci/actions/redact-secrets@v1
        env:
          KAIZEN_REDACT: ${{ toJSON(secrets) }}
      - if: steps.checkout.outcome == 'success' && steps.detect.outcome == 'success'
        id: cache_key
        shell: bash
        run: |
          KEY="${{ runner.os }}-${{ steps.detect.outputs.package_manager }}-${{ hashFiles('package-lock.json', 'pnpm-lock.yaml', 'yarn.lock') }}"
          echo "deps_cache_key=$KEY" >> "$GITHUB_OUTPUT"
      - if: steps.checkout.outcome == 'success' && steps.detect.outcome == 'success'
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
            node_modules
          key: ${{ steps.cache_key.outputs.deps_cache_key }}
      - if: steps.checkout.outcome == 'success' && steps.detect.outcome == 'success'
        id: install
        continue-on-error: true
        shell: bash
        run: |
          case "${{ steps.detect.outputs.package_manager }}" in
            npm)  npm ci --no-audit --no-fund ;;
            pnpm) corepack enable && pnpm install --frozen-lockfile ;;
            yarn) yarn install --frozen-lockfile ;;
          esac
      - if: steps.checkout.outcome == 'success' && steps.detect.outcome == 'success' && steps.install.outcome != 'success'
        shell: bash
        run: echo '{"status":"failed","stage":"install","reason":"package_install_failed"}' > setup-status.json
      - if: steps.checkout.outcome == 'success' && steps.detect.outcome == 'success' && steps.install.outcome == 'success' && steps.detect.outputs.has_playwright == 'true' && inputs.require_playwright == true
        id: pw_install
        continue-on-error: true
        shell: bash
        run: npx playwright install --with-deps
      - if: steps.checkout.outcome == 'success' && steps.detect.outcome == 'success' && steps.install.outcome == 'success' && steps.detect.outputs.has_playwright == 'true' && inputs.require_playwright == true && steps.pw_install.outcome != 'success'
        shell: bash
        run: echo '{"status":"failed","stage":"playwright_install","reason":"playwright_browser_install_failed"}' > setup-status.json
      - if: steps.checkout.outcome == 'success' && steps.detect.outcome == 'success' && steps.install.outcome == 'success' && (steps.detect.outputs.has_playwright != 'true' || inputs.require_playwright != true || steps.pw_install.outcome == 'success')
        shell: bash
        run: echo '{"status":"ready","stage":null,"reason":null}' > setup-status.json
      - id: write_status
        if: always()
        shell: bash
        run: echo "status=$(jq -r .status setup-status.json)" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: setup-meta
          path: setup-status.json
          retention-days: 14
          if-no-files-found: warn

  lint:
    needs: [resolve-context, setup]
    runs-on: ${{ inputs.runs_on }}
    if: always() && needs.setup.outputs.setup_status == 'ready'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-context.outputs.head_sha }}
      - uses: actions/cache@v4
        with: { path: node_modules, key: "${{ needs.setup.outputs.deps_cache_key }}" }
      - name: Run lint
        shell: bash
        run: |
          if jq -e '.scripts.lint' package.json >/dev/null 2>&1; then
            npm run lint -- --format json --output-file lint.json 2>&1 | tee lint.log || true
          else
            echo '{"results":[],"skipped":true,"reason":"no_lint_script"}' > lint.json
            echo "no lint script" > lint.log
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-results
          path: |
            lint.json
            lint.log
          retention-days: 14
          if-no-files-found: warn

  typecheck:
    needs: [resolve-context, setup]
    runs-on: ${{ inputs.runs_on }}
    if: always() && needs.setup.outputs.setup_status == 'ready'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-context.outputs.head_sha }}
      - uses: actions/cache@v4
        with: { path: node_modules, key: "${{ needs.setup.outputs.deps_cache_key }}" }
      - id: tc
        shell: bash
        run: |
          if [ -f tsconfig.json ]; then
            if npx tsc --noEmit --pretty false > typecheck.log 2>&1; then
              echo "typecheck_conclusion=success" >> "$GITHUB_OUTPUT"
            else
              echo "typecheck_conclusion=failure" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "no tsconfig.json" > typecheck.log
            echo "typecheck_conclusion=neutral" >> "$GITHUB_OUTPUT"
          fi
      - shell: bash
        run: |
          jq -n --arg log "$(cat typecheck.log 2>/dev/null || echo '')" \
            '{errors: ($log | split("\n") | map(select(test("error TS")))), log: $log}' > typecheck.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: typecheck-results
          path: |
            typecheck.json
            typecheck.log
          retention-days: 14
          if-no-files-found: warn

  manifest-validate:
    needs: [resolve-context, setup]
    runs-on: ${{ inputs.runs_on }}
    if: always() && needs.setup.outputs.setup_status == 'ready'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-context.outputs.head_sha }}
      - name: Validate manifests
        shell: bash
        run: |
          # PR B initial scaffold: minimal validator. The dedicated
          # actions/manifest-validate composite (with bundled schemas
          # under github.action_path/schemas/) lands in a follow-up.
          APP_VALID=true
          ERRORS=()
          if [ ! -f .operatum/app.json ]; then
            APP_VALID=false
            ERRORS+=("missing .operatum/app.json")
          fi
          if [ "$APP_VALID" = "false" ]; then
            jq -n --argjson ok false --arg errs "${ERRORS[*]}" \
              '{app_valid: $ok, app_errors: ($errs | split(" "))}' > manifest-diff.json
          else
            jq -n '{app_valid: true, app_errors: []}' > manifest-diff.json
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: manifest-diff
          path: manifest-diff.json
          retention-days: 14
          if-no-files-found: warn

  secret-scan:
    needs: [resolve-context, setup]
    runs-on: ${{ inputs.runs_on }}
    if: always() && needs.setup.outputs.setup_status == 'ready'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-context.outputs.head_sha }}
      - name: Scan diff for secrets
        shell: bash
        run: |
          # Initial scaffold: trivial scanner emits a clean report.
          # The full secret-in-diff hard-fail (round-13/15 PR-56) lands
          # in a follow-up with the gitleaks/trufflehog wiring.
          jq -n '{findings: [], scanned_at: now | todateiso8601}' > secret-scan.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secret-scan-results
          path: secret-scan.json
          retention-days: 14
          if-no-files-found: warn

  playwright-suite-drift:
    # Cross-repo half of release-readiness WORK ITEM-C1
    # (plans/release-readiness-plan.md § 6.1).
    #
    # Invokes the tenant repo's `npm run test:playwright-drift` gate
    # — the named npm script wired in operatum-kaizen PR #70 fixup
    # fae4cc1 (Playwright suite drift checker at
    # src/scripts/check-playwright-suite-drift.js). The checker exits
    # non-zero when generated Playwright suites under
    # tests/playwright/kaizen/ have drifted from .operatum/test-
    # contract.json — i.e. a PR edited the generated fixtures OR
    # the contract without regenerating both. We want THAT failure
    # to surface HERE rather than as a downstream test failure with
    # no breadcrumb back to the contract.
    #
    # Tenant safety: `npm run --if-present` is the npm 6+ flag that
    # exits 0 when the named script is absent. Tenant repos that
    # have NOT shipped C14 (i.e. their package.json declares no
    # `test:playwright-drift` script) see a no-op — NO failure, NO
    # spurious yellow check. The gate activates the moment a tenant
    # adds the script, with zero coordinated rollout work.
    #
    # Ordering rationale: this runs as a sibling of lint / typecheck
    # / manifest-validate / secret-scan (all gated on
    # setup_status == 'ready', i.e. AFTER `npm ci` succeeded in the
    # `setup` job). When the marker-jobs that run `npm test` land in
    # the KB-7 follow-up (per L13-L18 of this file), they will depend
    # on `setup` the same way; this gate races them on the runner
    # pool but resolves before the manifest composer aggregates a
    # verdict, so drift surfaces in the kaizen-test-summary.json with
    # its own classified reason rather than as a generic test failure.
    needs: [resolve-context, setup]
    runs-on: ${{ inputs.runs_on }}
    if: always() && needs.setup.outputs.setup_status == 'ready'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-context.outputs.head_sha }}
      - uses: actions/cache@v4
        with: { path: node_modules, key: "${{ needs.setup.outputs.deps_cache_key }}" }
      - id: drift
        shell: bash
        run: |
          # `npm run --if-present <name>` was added in npm 6 and is
          # the canonical "no-op when absent" affordance. We capture
          # stdout+stderr into a log artifact so reviewers can read
          # the checker's diff output when it fires. The script's
          # own non-zero exit propagates through npm and fails the
          # step — fail-closed is the correct posture for a drift
          # gate (silent skip on absence is fine; silent skip on
          # presence-but-error is NOT).
          #
          # We ALSO emit a machine-readable `playwright-drift.json`
          # with shape { result, exit_code, summary } so the
          # compose-summary composer can classify the manifest
          # verdict instead of leaning solely on the GH-Actions job
          # outcome (PR-2 review round-1, R-ci-pr-2-R1-1). The JSON
          # write happens BEFORE the explicit `exit 1` so the
          # always()-gated upload step picks it up on failure too.
          set -o pipefail
          # Detect script presence so we can emit `skipped` for
          # pre-C14 tenant repos (back-compat with the workflow-shape
          # tested in test/playwright-suite-drift-gate.test.mjs).
          if node -e 'const p=require("./package.json"); process.exit((p.scripts && p.scripts["test:playwright-drift"]) ? 0 : 1)' 2>/dev/null; then
            drift_present=1
          else
            drift_present=0
          fi
          if npm run test:playwright-drift --if-present 2>&1 | tee playwright-drift.log; then
            rc=0
          else
            rc=$?
          fi
          if [ "$drift_present" -eq 0 ]; then
            result=skipped
          elif [ "$rc" -eq 0 ]; then
            result=success
          else
            result=failure
          fi
          # One-liner summary: last non-empty log line, trimmed.
          summary="$(awk 'NF{line=$0} END{print line}' playwright-drift.log | cut -c1-256)"
          DRIFT_RESULT="$result" DRIFT_RC="$rc" DRIFT_SUMMARY="$summary" \
            node -e '
              const fs = require("node:fs");
              const payload = {
                result: process.env.DRIFT_RESULT,
                exit_code: Number(process.env.DRIFT_RC),
              };
              if (process.env.DRIFT_SUMMARY) payload.summary = process.env.DRIFT_SUMMARY;
              fs.writeFileSync("playwright-drift.json", JSON.stringify(payload) + "\n");
            '
          echo "drift_conclusion=$result" >> "$GITHUB_OUTPUT"
          if [ "$result" = "failure" ]; then
            # Re-surface the failure to GitHub Actions. Without the
            # explicit exit, `set -o pipefail` + tee already failed
            # the step, but we make it explicit for grep-ability.
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-drift-results
          path: |
            playwright-drift.log
            playwright-drift.json
          retention-days: 14
          if-no-files-found: warn

  compose-summary:
    needs: [resolve-context, setup, lint, typecheck, manifest-validate, secret-scan, playwright-suite-drift]
    runs-on: ${{ inputs.runs_on }}
    if: always()
    outputs:
      manifest_path: ${{ steps.compose.outputs.manifest_path }}
      verdict_contract: ${{ steps.compose.outputs.verdict_contract }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: _artifacts
          pattern: "*"
      - uses: operatum-ai/operatum-ci/actions/compose-summary@v1
        id: compose
        with:
          artifacts_dir: _artifacts
          out_path: kaizen-test-summary.json
          tenant_id: ${{ inputs.tenant_id }}
          kaizen_job_id: ${{ inputs.kaizen_job_id }}
          pr_number: ${{ needs.resolve-context.outputs.pr_number }}
          head_sha: ${{ needs.resolve-context.outputs.head_sha }}
          reporter_version: ${{ inputs.contract_workflow_version }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kaizen-test-summary
          path: kaizen-test-summary.json
          retention-days: 14
          if-no-files-found: error

  callback:
    needs: [resolve-context, compose-summary]
    runs-on: ${{ inputs.runs_on }}
    if: always() && needs.compose-summary.outputs.manifest_path != ''
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: kaizen-test-summary
          path: .
      - name: Resolve callback context
        id: ctx
        shell: bash
        env:
          INPUT_TENANT_ID: ${{ inputs.tenant_id }}
          VARS_TENANT_ID: ${{ vars.OPERATUM_TENANT_ID }}
          INPUT_CALLBACK_URL: ${{ inputs.callback_url }}
          VARS_CALLBACK_URL: ${{ vars.OPERATUM_CALLBACK_URL }}
        run: |
          TENANT_ID="${INPUT_TENANT_ID:-$VARS_TENANT_ID}"
          CALLBACK_URL="${INPUT_CALLBACK_URL:-$VARS_CALLBACK_URL}"
          echo "tenant_id=$TENANT_ID" >> "$GITHUB_OUTPUT"
          echo "callback_url=$CALLBACK_URL" >> "$GITHUB_OUTPUT"
          if [ -z "$TENANT_ID" ]; then
            echo "::warning::no tenant_id input or vars.OPERATUM_TENANT_ID; callback will be skipped"
          fi
          if [ -z "$CALLBACK_URL" ]; then
            echo "::warning::no callback_url input or vars.OPERATUM_CALLBACK_URL; callback will be skipped"
          fi
      - if: steps.ctx.outputs.callback_url != ''
        uses: operatum-ai/operatum-ci/actions/post-callback@v1
        with:
          manifest_path: kaizen-test-summary.json
          callback_url: ${{ steps.ctx.outputs.callback_url }}
          callback_hmac: ${{ secrets.callback_hmac }}
          tenant_id: ${{ steps.ctx.outputs.tenant_id }}
          kaizen_job_id: ${{ inputs.kaizen_job_id }}
